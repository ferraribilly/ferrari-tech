<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#36a2eb">
        <title>login</title>
        <link rel="apple-touch-icon" href="{{ url_for('static', filename='w.png') }}">
        <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
        <link rel="shortcut icon" href="{{ url_for('static', filename='w.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

                        
</head>
<body class="bg-light"></body>
<div style="background-color: rgb(0, 1, 1); height: 100%;" class="container py-4">
    <!-- Botão Voltar -->
    <a href="/" class="btn-voltar"><span class="seta">←</span> Voltar</a>

    <div style="background-color: rgba(244, 250, 255, 0.131);" class="card mb-4">
      <!-- Formulário de Login -->
    <div class="card-body">
        <form id="formLogin">
            <h2 style="text-align: center; color: #fff;">Acesse seu Painel</h2>
            <div class="mb-3">
                <input id="cpfLogin" type="text" class="form-control" name="cpf" placeholder="Digite seu CPF (somente n° s/ pontos)" pattern="\d{11}"  required>            
            </div>

            <button style="width: 100%; border-radius: 20px; font-family: monospace; font-size: 18px;" type="submit" class="btn btn-success">
                Acessar Painel
            </button>
        </form>

        <!-- Mensagem de erro ou sucesso -->
        <div id="loginMsg"></div>
    </div>

    </div>

</div>
    </div>
</div>



<script src="../static/js/login.js"></script>
</body>
</html>
