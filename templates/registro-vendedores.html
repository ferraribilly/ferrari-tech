<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#36a2eb">
        <title>Registro vendedores</title>
        <link rel="apple-touch-icon" href="{{ url_for('static', filename='w.png') }}">
        <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
        <link rel="shortcut icon" href="{{ url_for('static', filename='w.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        

                        
</head>

 <body class="bg-light">
<div style="background-color: rgb(13, 0, 19); height: 100%;" class="container py-4">
    <h1 class="text-center mb-4"></h1>
    <!-- Formulário de Registro -->
    <div style="background-color: rgba(248, 246, 248, 0.793); text-align: center;" class="card mb-4">
        <div style="text-align: center; font-family: monospace; font-weight: bold;"></div>
        <div class="card-body">
            
            <form id="formRegistro">
                <h2>Registre-se</h2>

    <div class="mb-3">
        <input id="nome" type="text" class="form-control" name="nome" placeholder="Digite seu nome" required>
    </div>

    <div class="mb-3">
        <input id="sobrenome" type="text" class="form-control" name="sobrenome" placeholder="Digite seu sobrenome" required>
    </div>

    <div class="mb-3">
        <input id="cpf" type="text" class="form-control" name="cpf" placeholder="Digite seu CPF (somente n° s/ pontos)" pattern="\d{11}" required>
    </div>

 <div class="mb-3">
    <input id="dt_nascimento" type="date" class="form-control" name="dt_nascimento" required>
</div>

    <div class="mb-3">
        <input id="email" type="text" class="form-control" name="email" placeholder="Digite seu email" required>
    </div>

 
    <div class="mb-3">
        <input id="chave_pix" type="text" class="form-control" name="chave_pix" placeholder="Digite sua chave PIX" required>
    </div>

    <!-- BOTÃO SEMPRE POR ÚLTIMO -->
    <button style="border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-weight: bold; transition: all 0.3s ease;" type="submit" class="btn btn-success w-100">
        Confirmar Registro
    </button>

</form>
            <div id="registroMsg" class="mt-2"></div>
        </div>
                <!-- Formulário de Login -->
    <div class="card-body">
        <form id="formLogin">
            <h2 style="text-align: center; color: #fff;">Acesse seu Painel</h2>
            <div class="mb-3">
                <input id="cpfLogin" type="text" class="form-control" name="cpf" placeholder="Digite seu CPF (somente n° s/ pontos)" pattern="\d{11}"  required>            
            </div>

            <button style="width: 100%; border-radius: 20px; font-family: monospace; font-size: 18px;" type="submit" class="btn btn-success">
                Acessar Painel
            </button>
        </form>

        <!-- Mensagem de erro ou sucesso -->
        <div id="loginMsg"></div>
    </div>
                <!-- Botão Voltar -->
    <a href="/" class="btn-voltar">
    <span class="seta">←</span> Voltar
    </a>
    </div>


    </div>
</div>





<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/registro_login_vendedores.js') }}"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const input = document.getElementById('vendedorInput');
    const modalElement = document.getElementById('vendedorModal');
    const modal = new bootstrap.Modal(modalElement);

    document.querySelectorAll('.vendor-option').forEach(option => {
        option.addEventListener('click', function () {
            input.value = this.textContent.trim();
            modal.hide();
        });
    });

});


</script>

</body>
</html>
