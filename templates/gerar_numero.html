<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#36a2eb">
        <title>Passatempo Pix Dia das Maes</title>
        <link rel="apple-touch-icon" href="{{ url_for('static', filename='w.png') }}">
        <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
        <link rel="shortcut icon" href="{{ url_for('static', filename='w.png') }}">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #020c1a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    header {
      background: #4a90e2;
      color: white;
      text-align: center;
      padding: 1rem;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .container {
      flex: 1;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center; /* centraliza horizontal */
      justify-content: flex-start;
    }

    .input-numero {
      max-width: 300px; /* limite de largura */
      width: 100%;
      font-size: 2rem;
      text-align: center;
      padding: 0.5rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: white;
      margin-bottom: 1rem;
    }

    button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-generate {
      background: #4a90e2;
      color: white;
      margin-bottom: 1rem;
    }

    .btn-generate:hover {
      background: #357ab8;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 300px; /* cards alinhados */
      border: 1px solid #fff;
      border-radius: 3px;
    }

  .card {
  position: relative;
  background-image: url('../static/img/Edit.org_design.jpg'); 
  background-position: center; 
  background-size: cover; 
  background-repeat: no-repeat;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid #fff;
}

/* camada escura por cima da imagem */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5); /* escurece a imagem */
}

/* conteúdo fica acima */
.card-content {
  position: relative;
  z-index: 2;
  padding: 1rem;
  color: white;
}
    .card h3 {
      margin: 0.4rem 0;
      color: #fffcfc;
      text-align: center;
      font-family: monospace;
      font-weight: bold;
      margin-left: 100px;
      font-size: 1.5rem;
    }
 

    footer {
      background: #0a013b;
      border-top: 1px solid #ddd;
      padding: 0.8rem;
      position: sticky;
      bottom: 0;
      overflow: hidden;
      z-index: 99;
    }

    .purchase {
      background: #0054d1;
      color: white;
      font-family: monospace;
      font-weight: bold;
    }

    .purchase:hover {
      background: #1e874b;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @media (max-width: 600px) {
      .input-numero {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header style="font-family: monospace; font-weight: bold;">GERAR NUMEROS</header>
  <div class="container">
    <p style="color:#fff; font-weight: bold; font-family: monospace;">
      Nome:
      <span id="nome" style="color: #4a90e2;" >{{ usuario.nome }}</span>
    </p>
    <p style="color:#fff; font-weight: bold; font-family: monospace;">
      CPF:
       <span id="cpf" style="color: #4a90e2;" >{{usuario.cpf }}</span>
      </p>
    <p style="color:#fff; font-weight: bold; font-family: monospace;">
      email:
      <span  id="email" style="color: #4a90e2;" >{{ usuario.email }}</span>
    </p>
    <strong style="color: #0054d1;">{{id}}</strong>
    <strong style="color: #0054d1;">{{nome}}</strong>
    <input id="formCompra" type="text" class="input-numero" maxlength="3" placeholder="Digite seu número (ex: 001)">
    <button class="btn-generate" onclick="gerarBilhete()">Gerar Bilhete</button>
    <h3 style="color:#fff;">Total: R$ <span id="total">0.00</span></h3>
  
    <div class="cards" id="cards"></div>
  </div>

<footer style="display: flex; gap: 10px; margin: 10px; padding: 10px; font-family: monospace;">
  <button class="purchase" id="btn-pagar">PIX RAPIDO</button>
  <button class="purchase" id="btn-preference">PREFERENCE MERCADO PAGO</button>
</footer>
